<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card border-0 shadow-lg rounded-4">
        
        <div class="card-header bg-primary text-white p-4 rounded-top-4 border-0">
          <h3 class="mb-0 fw-bold"><i class="bi bi-plus-circle-fill"></i>Submit a Report</h3>
          <p class="mb-0 opacity-75">Fill out the details below to report a lost or found item.</p>
        </div>
        
        <div class="card-body p-4 p-md-5">
          <div *ngIf="successMessage" class="alert alert-success rounded-3 mb-3" role="alert">
            {{ successMessage }}
          </div>
          <div *ngIf="errorMessage" class="alert alert-danger rounded-3 mb-3" role="alert">
            {{ errorMessage }}
          </div>

          <div class="alert alert-light border d-flex align-items-center rounded-3 mb-4" role="alert">
            <i class="bi bi-shield-lock-fill text-primary me-3 fs-4"></i>
            <div class="small">
              <strong>Privacy Note:</strong> Uploaded photos are hidden from public view and are visible to system administrators only.
            </div>
          </div>

          <form (ngSubmit)="submitReport()" #itemForm="ngForm">
            
            <div class="mb-4">
              <label class="form-label fw-bold text-dark">Item Title</label>
              <div class="input-group">
                <span class="input-group-text bg-white border-end-0"><i class="bi bi-pencil-square"></i></span>
                <input 
                  type="text" 
                  name="title" 
                  [(ngModel)]="item.title" 
                  class="form-control border-start-0 ps-0" 
                  placeholder="e.g., Black Samsung Galaxy S23" 
                  required>
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-bold text-dark">Description</label>
              <textarea 
                name="description" 
                [(ngModel)]="item.description" 
                class="form-control" 
                rows="4" 
                placeholder="Describe where/when it was lost or found and include key details (e.g., brand, color, serial number)." 
                required></textarea>
            </div>

            <div class="row g-3">
              <div class="col-md-6 mb-4">
                <label class="form-label fw-bold text-dark">Category</label>
                <select name="category" [(ngModel)]="item.category" class="form-select shadow-sm" required>
                  <option value="" disabled selected>Select a category</option>
                  <option value="Electronics">Electronics</option>
                  <option value="Pets">Pets</option>
                  <option value="Documents">Documents</option>
                  <option value="Wallets/Keys">Wallets/Keys</option>
                  <option value="Clothing">Clothing</option>
                  <option value="Other">Other</option>
                </select>
              </div>

              <div class="col-md-6 mb-4">
                <label class="form-label fw-bold text-dark">Report Type</label>
                <select name="type" [(ngModel)]="item.type" class="form-select shadow-sm" required>
                  <option value="" disabled selected>Is it lost or found?</option>
                  <option value="Lost">Lost</option>
                  <option value="Found">Found</option>
                </select>
              </div>
            </div>

            <div class="row g-3">
              <div class="col-md-6 mb-4">
                <label class="form-label fw-bold text-dark">Location (Optional)</label>
                <div class="input-group">
                  <span class="input-group-text bg-white border-end-0"><i class="bi bi-geo-alt"></i></span>
                  <input 
                    type="text" 
                    name="location" 
                    [(ngModel)]="item.location" 
                    class="form-control border-start-0 ps-0" 
                    placeholder="e.g., Library 2nd floor, West Wing">
                </div>
              </div>

              <div class="col-md-6 mb-4">
                <label class="form-label fw-bold text-dark">Contact Info (Optional)</label>
                <div class="input-group">
                  <span class="input-group-text bg-white border-end-0"><i class="bi bi-telephone"></i></span>
                  <input 
                    type="text" 
                    name="contact" 
                    [(ngModel)]="item.contact" 
                    class="form-control border-start-0 ps-0" 
                    placeholder="e.g., 0912-345-6789 / name@email.com">
                </div>
              </div>
            </div>

            <div class="mb-5">
              <label class="form-label fw-bold text-dark">Item Photo (Optional)</label>
              <div class="p-4 border border-2 border-dashed rounded-3 text-center bg-light">
                <i class="bi bi-images fs-2 text-muted mb-2 d-block"></i>
                <input
                  type="file"
                  accept="image/png,image/jpeg,image/webp"
                  class="form-control form-control-sm mx-auto"
                  style="max-width: 250px;"
                  (change)="onImageSelected($event)">
                <p *ngIf="item.imageDataUrl" class="small text-success mt-2 mb-0">
                  Image ready to upload.
                </p>
                <p class="small text-muted mt-2 mb-0">Drag and drop or click to upload</p>
              </div>
            </div>

            <div class="d-flex gap-2 justify-content-end border-top pt-4">
              <button type="button" class="btn btn-outline-secondary px-4 rounded-pill" (click)="resetForm()">
                Clear Form
              </button>
              <button 
                type="submit" 
                class="btn btn-primary px-5 rounded-pill shadow-sm fw-bold" 
                [disabled]="!itemForm.form.valid || isSubmitting">
                <i class="bi bi-check2-circle me-2"></i>Submit Report
              </button>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
