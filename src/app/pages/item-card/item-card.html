<div class="custom-item-card d-flex align-items-center p-3 border-stroke">
  <div class="image-wrapper position-relative me-4">
    <img
      [src]="getItemImage(item.image_path)"
      class="item-img"
      alt="item image"
      (error)="handleImageError($event)"
    />

    <div class="type-badge position-absolute border-stroke">
      <app-badge [label]="getBadgeLabel()" [variant]="getBadgeVariant()"></app-badge>
    </div>
  </div>

  <div class="content-wrapper flex-grow-1 py-2">
    <h4 class="fw-bold mb-0 text-dark">{{ item.title }}</h4>
    <p class="text-muted small mb-2">Category: {{ item.category_name || 'General' }}</p>
    <p class="description-text text-secondary mb-3">{{ item.description }}</p>

    <div class="details-section mb-3">
      <div class="d-flex align-items-center text-muted small mb-1">
        <i class="bi bi-geo-alt me-2"></i>
        <span>{{ item.type === 'Found' ? 'Found at' : 'Lost at' }} {{ item.location }}</span>
      </div>
      <div class="d-flex align-items-center text-muted small">
        <i class="bi bi-calendar3 me-2"></i>
        <span>On : {{ item.created_at | date:'dd/MM/yyyy' }}</span>
      </div>
    </div>

    <div class="text-end">
      <button class="btn action-btn rounded-pill px-4 border-0" [ngClass]="item.type === 'Found' ? 'btn-blue' : 'btn-purple'">
        {{ getActionLabel() }}
      </button>
    </div>
  </div>
</div>
