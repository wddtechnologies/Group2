<div class="container py-5">
  <div class="text-center mb-5">
    <h1 class="display-5 fw-bold">Find what you lost, <br> return what you found.</h1>
    <p class="text-muted mt-3">Join our community to help reunite people with their belongings.</p>
  </div>

  <div class="d-flex justify-content-between align-items-center mb-5 gap-3">
    <div class="search-container flex-grow-1">
      <div class="input-group rounded-pill bg-light border-stroke px-3 py-1">
        <span class="input-group-text bg-transparent border-0 text-muted"><i class="bi bi-search"></i></span>
        <input type="text" class="form-control bg-transparent border-0" placeholder="Search...">
      </div>
    </div>
    <button class="btn btn-light rounded-pill border-stroke px-4 py-2 shadow-sm">
      <i class="bi bi-sliders me-2"></i>filter
    </button>
    <button class="btn btn-dark rounded-pill px-4 py-2" routerLink="/add-item">Add an item</button>
    <button class="btn btn-outline-dark rounded-pill px-4 py-2" routerLink="/admin-login">Admin Portal</button>
  </div>

  <div class="row g-4">
    @for (item of reports; track item.id) {
      <div class="col-xl-6">
        <app-item-card [item]="item"></app-item-card>
      </div>
    } @empty {
      <div class="col-12 text-center py-5">
        <div *ngIf="!isLoading" class="alert alert-light border-stroke rounded-4">
           <i class="bi bi-info-circle me-2"></i> No approved items found in the database.
        </div>
      </div>
    }
  </div>
</div>
